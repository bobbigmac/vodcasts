<!doctype html>
<html lang="en" id="htmlRoot" data-theme="modern">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{page_title}}</title>
  {{meta_head_html}}
  <meta name="theme-color" content="#0b0c10" />
  <link rel="stylesheet" href="{{base_path}}assets/style.css">
  <link rel="stylesheet" href="{{base_path}}assets/themes.css">

</head>

      <nav class="supportFooterLinks" aria-label="Support">
        <a href="{{base_path}}about/">About</a>
        <a href="{{base_path}}for/">Who it’s for</a>

      <div class="supportFooterMeta">Contact: <a href="mailto:admin@prays.be">admin@prays.be</a></div>

</html>
